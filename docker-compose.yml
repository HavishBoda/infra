services:
  sidecar:
    build: ./sidecar
    ports:
      - "8000:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface

  goserver:
    build: ./goserver
    ports:
      - "8080:8080"
    depends_on:
      - sidecar
    environment:
      - SIDECAR_URL=http://sidecar:8000

volumes:
  huggingface_cache: